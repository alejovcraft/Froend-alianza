<nav *ngIf="rolUsuario === 'ROLE_USER' || !rolUsuario" class="navbar navbar-expand-lg navbar-dark fixed-top shadow-sm" style="background-color: #001a3b;">
    <a class="navbar-brand font-weight-bold" routerLink="/panel-user" style="font-size: 1.5rem; letter-spacing: 1px;">Alianza Lima</a>
    
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navUser">
        <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="collapse navbar-collapse" id="navUser">
        <ul class="navbar-nav mr-auto align-items-center">
            <li class="nav-item"><a class="nav-link" routerLink="/panel-user">Inicio</a></li>
            <li class="nav-item"><a class="nav-link" routerLink="/entradas">Entradas</a></li>
            
            <li class="nav-item"><a class="nav-link" href="#">Productos</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Carrito</a></li>
            
            <li class="nav-item" *ngIf="nombreUsuario">
                <a class="nav-link" routerLink="/mis-entradas" style="color: #B8A26A; font-weight: bold;">
                    🎟️ Mis Entradas
                </a>
            </li>
        </ul>
        
        <ul class="navbar-nav align-items-center">
            <ng-container *ngIf="nombreUsuario">
                <li class="nav-item text-light mr-3">
                    Hola, <strong>{{ nombreUsuario | uppercase }}</strong>
                </li>
                <li class="nav-item">
                    <button class="btn btn-danger btn-sm font-weight-bold px-3 py-2" style="border-radius: 6px;" (click)="cerrarSesion()">
                        Cerrar Sesión
                    </button> 
                </li>
            </ng-container>

            <ng-container *ngIf="!nombreUsuario">
                <li class="nav-item">
                    <a class="btn btn-outline-light btn-sm font-weight-bold px-3 py-2" style="border-radius: 6px;" routerLink="/login">
                        Iniciar Sesión
                    </a> 
                </li>
            </ng-container>
        </ul>
    </div>
</nav>

<nav *ngIf="rolUsuario === 'ROLE_PROVEEDOR'" class="navbar navbar-expand-lg navbar-dark fixed-top shadow" style="background-color: #212529; border-bottom: 3px solid #B8A26A;">
    <a class="navbar-brand font-weight-bold" routerLink="/panel-proveedor">Portal Proveedores</a>
    
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navProv">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navProv">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item"><a class="nav-link" routerLink="/panel-proveedor">Inicio</a></li>
            <li class="nav-item"><a class="nav-link text-warning font-weight-bold" routerLink="/gestion-entradas">🎟️ Gestión de Entradas</a></li>
        </ul>
        <ul class="navbar-nav align-items-center">
            <li class="nav-item text-light mr-4">
                Proveedor: <strong class="ml-1">{{ nombreUsuario }}</strong>
            </li>
            <li class="nav-item">
                <button class="btn btn-outline-danger btn-sm" (click)="cerrarSesion()">Salir</button> 
            </li>
        </ul>
    </div>
</nav>

<nav *ngIf="rolUsuario === 'ROLE_ADMIN'" class="navbar navbar-dark bg-dark fixed-top shadow">
    <span class="navbar-brand mb-0 h1 text-info"><i class="fas fa-shield-alt mr-2"></i>Panel de Administración</span>
    <div class="d-flex align-items-center text-white">
        <span class="mr-3">Admin: <strong>{{ nombreUsuario }}</strong></span>
        <button class="btn btn-outline-danger btn-sm" (click)="cerrarSesion()">Cerrar Sesión</button>
    </div>
</nav>
