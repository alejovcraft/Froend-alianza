<div class="login-container">
  <div class="login-box">
    <h2>Ingreso al Sistema</h2>
    <p>Familia Blanquiazul</p>

    <div class="input-group">
      <label>Usuario</label>
      <input type="text" [(ngModel)]="username" placeholder="Escribe tu usuario">
    </div>

    <div class="input-group">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="password" placeholder="Tu contraseña">
    </div>

    <button (click)="hacerLogin()">Ingresar</button>

    <p class="error-msg" *ngIf="mensajeError">{{ mensajeError }}</p>
  </div>
</div>
