<div class="login-wrapper">
    <div class="login-card text-center">
        
        <img src="/img/menuprincipal/alianza.png" alt="Escudo Alianza Lima" style="width: 80px; margin-bottom: 1rem;">
        <h2>Acceso al Portal</h2>
        
        <div *ngIf="mensajeError" class="alert alert-danger" role="alert">
            <span>{{ mensajeError }}</span>
        </div>
    
        <form (ngSubmit)="hacerLogin()">
            <div class="form-group text-left">
                <label for="username">Usuario:</label>
                <input type="text" class="form-control" id="username" name="username" [(ngModel)]="username" placeholder="Ingresa tu nombre de usuario" required>
            </div>
            
            <div class="form-group text-left">
                <label for="password">Contraseña:</label>
                <input type="password" class="form-control" id="password" name="password" [(ngModel)]="password" placeholder="Ingresa tu contraseña" required>
            </div>
            
            <button type="submit" class="btn btn-login btn-block mt-4">INGRESAR</button>
        </form>
                
        <div class="mt-3">
            <p class="small text-center mb-1">
                <a routerLink="/registro" class="text-secondary" style="text-decoration: underline;">
                    ¿No tienes cuenta? ¡Regístrate aquí!
                </a>
            </p>
            
            <a routerLink="/" class="small text-secondary">Volver a la página principal</a>
        </div>
    </div>
</div>
